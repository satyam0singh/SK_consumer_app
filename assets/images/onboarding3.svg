<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="600" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#90EE90;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006400;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="600" fill="url(#grad3)"/>
  
  <!-- Map background -->
  <rect x="50" y="100" width="300" height="250" rx="15" fill="white" opacity="0.2"/>
  
  <!-- Route/Path -->
  <path d="M 150 150 L 250 200 L 200 280" stroke="white" stroke-width="3" fill="none" opacity="0.6"/>
  
  <!-- Farm marker -->
  <circle cx="150" cy="150" r="15" fill="#FF6347"/>
  <text x="150" y="155" font-family="Arial" font-size="12" text-anchor="middle" fill="white" font-weight="bold">🌾</text>
  
  <!-- House marker -->
  <circle cx="200" cy="280" r="15" fill="#228B22"/>
  <text x="200" y="283" font-family="Arial" font-size="12" text-anchor="middle" fill="white" font-weight="bold">🏠</text>
  
  <!-- Truck marker -->
  <circle cx="250" cy="200" r="15" fill="#1B8A6E"/>
  <text x="250" y="203" font-family="Arial" font-size="12" text-anchor="middle" fill="white" font-weight="bold">🚚</text>
  
  <text x="200" y="420" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle" fill="white">
    Track food from
  </text>
  <text x="200" y="450" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle" fill="white">
    farm to doorstep
  </text>
  
  <g transform="translate(200, 520)">
    <circle cx="-15" cy="0" r="8" fill="white" opacity="0.8"/>
    <circle cx="0" cy="0" r="8" fill="white" opacity="0.6"/>
    <circle cx="15" cy="0" r="8" fill="white" opacity="0.4"/>
  </g>
</svg>
